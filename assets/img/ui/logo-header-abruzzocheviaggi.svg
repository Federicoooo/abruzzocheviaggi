<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250" role="img" aria-labelledby="title desc">
  <title id="title">Abruzzo che Viaggi - logo header</title>
  <desc id="desc">Logo con nuvole, sole e scritta azzurra pensato per header su sfondo scuro.</desc>
  <defs>
    <linearGradient id="skyArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6fc4ff"/>
      <stop offset="100%" stop-color="#2d7fe7"/>
    </linearGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d7ebff"/>
    </linearGradient>
    <linearGradient id="cloudEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9f6ff"/>
      <stop offset="100%" stop-color="#8dc8ff"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fd0ff"/>
      <stop offset="100%" stop-color="#2d89ea"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#0a3a75" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g transform="translate(70 18)">
