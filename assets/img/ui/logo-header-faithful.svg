<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250" role="img" aria-labelledby="title desc">
  <title id="title">Abruzzo che viaggi - logo header fedele</title>
  <desc id="desc">Logo header fedele al riferimento allegato, con nuvole, arco azzurro e sole, su margini trasparenti.</desc>
  <defs>
    <linearGradient id="arcFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94cdfb"/>
      <stop offset="100%" stop-color="#67acf1"/>
    </linearGradient>
    <linearGradient id="cloudFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f8fb"/>
      <stop offset="100%" stop-color="#d9e9f7"/>
    </linearGradient>
    <linearGradient id="cloudShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c6e5ff"/>
      <stop offset="100%" stop-color="#8cc4f5"/>
    </linearGradient>
    <linearGradient id="textFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c82de"/>
      <stop offset="100%" stop-color="#4d90e4"/>
    </linearGradient>
    <filter id="softHalo" x="-25%" y="-30%" width="150%" height="170%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="1.5" result="spread"/>
      <feGaussianBlur in="spread" stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.83 0 0 0 0 0.94 0 0 0 0 1 0 0 0 0.42 0" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sunGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0 0 0.95 0 0 0 0 0 0.45 0 0 0 0 0 0.8 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(24 18)" filter="url(#softHalo)">
