<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250" role="img" aria-labelledby="title desc">
  <title id="title">Abruzzo che viaggi - logo header semplice</title>
  <desc id="desc">Logo semplice con nuvole chiare, testo azzurro e alone luminoso per sfondo scuro.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fd2ff"/>
      <stop offset="100%" stop-color="#61aef8"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fdff"/>
      <stop offset="100%" stop-color="#d7ecff"/>
    </linearGradient>
    <linearGradient id="cloudStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cfeaff"/>
      <stop offset="100%" stop-color="#97cbff"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58b7ff"/>
      <stop offset="100%" stop-color="#238bea"/>
    </linearGradient>
    <filter id="outerGlow" x="-30%" y="-35%" width="160%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="2" result="spread"/>
      <feGaussianBlur in="spread" stdDeviation="16" result="blur1"/>
      <feGaussianBlur in="spread" stdDeviation="32" result="blur2"/>
      <feColorMatrix in="blur1" type="matrix" values="0 0 0 0 0.82 0 0 0 0 0.94 0 0 0 0 1 0 0 0 0.8 0" result="glow1"/>
      <feColorMatrix in="blur2" type="matrix" values="0 0 0 0 0.82 0 0 0 0 0.94 0 0 0 0 1 0 0 0 0.42 0" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sunGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feColorMatrix in="b" type="matrix" values="1 0 0 0 0 0 0.95 0 0 0 0 0 0.45 0 0 0 0 0 1 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1268bc" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g transform="translate(48 18)" filter="url(#outerGlow)">
    <path d="M178 119c64-34 140-52 230-55 115-4 213 24 279 78-34 5-59 14-77 25-44-13-100-18-171-18H220c-52 0-100 5-140 16-15-10-40-20-67-24 43-21 104-29 165-22z" fill="url(#sky)" opacity="0.95"/>

    <g transform="translate(500 20)" filter="url(#sunGlow)">
      <circle cx="88" cy="46" r="24" fill="#ffd92b"/>
      <circle cx="94" cy="42" r="19" fill="#fff484" opacity="0.6"/>
      <g stroke="#ffe98a" stroke-width="6" stroke-linecap="round" opacity="0.95">
        <path d="M88 2v20"/>
        <path d="M88 70v20"/>
        <path d="M46 46H26"/>
        <path d="M150 46h-20"/>
        <path d="M58 16 42 0"/>
        <path d="M119 16 135 0"/>
        <path d="M58 76 43 92"/>
        <path d="M118 76 133 92"/>
      </g>
    </g>

    <g fill="url(#cloud)" stroke="url(#cloudStroke)" stroke-width="5">
      <path d="M34 172c0-22 19-40 43-40 7 0 14 2 20 5 8-21 28-35 51-35 10 0 19 2 28 7 8-18 27-30 48-30 24 0 45 16 52 39 8-4 16-6 26-6 23 0 42 14 49 35 7-2 13-3 20-3 20 0 38 9 49 24 8-4 17-6 26-6 20 0 38 9 50 24 10-6 22-10 35-10 16 0 31 6 42 17 12-7 26-11 41-11 27 0 50 14 63 35 6-1 11-2 17-2 20 0 38 10 49 27-18 9-44 13-78 13H82c-35 0-48-9-48-17z"/>
      <path d="M117 182c0-16 14-29 30-29 8 0 16 3 22 7 7-17 24-28 42-28 13 0 25 5 34 14 10-8 22-12 35-12 16 0 31 7 41 18 9-5 19-8 30-8 15 0 29 6 39 17 9-5 19-8 30-8 15 0 29 6 39 16 8-4 17-6 26-6 15 0 30 7 39 18 7-3 14-4 22-4 17 0 32 8 42 21-21 7-48 10-82 10H176c-40 0-59-5-59-18z" opacity="0.95"/>
    </g>

    <text x="118" y="169" font-size="86" font-weight="700" font-style="italic" fill="url(#titleFill)" stroke="#3f9ef5" stroke-width="2" paint-order="stroke fill" filter="url(#textShadow)" style="font-family:'Brush Script MT','Segoe Script','Lucida Handwriting',cursive;">Abruzzo che viaggi</text>
  </g>
</svg>
